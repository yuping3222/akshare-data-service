        pct_change: "float"
        volume: "float"
        amount: "float"
        open: "float"
        high: "float"
        low: "float"
        prev_close: "float"

    - name: "akshare_sina"
      func: "stock_zh_a_spot"
      enabled: true
      input_mapping: {}
      output_mapping:
        code: "symbol"
        name: "name"
        trade: "price"
        changepercent: "pct_change"
        volume: "volume"
        amount: "amount"
        open: "open"
        high: "high"
        low: "low"
        settlement: "prev_close"
      column_types:
        price: "float"
