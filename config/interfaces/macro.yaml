# 宏观数据接口
# category: macro

macro_cpi:
  name: "macro_cpi"
  category: "macro"
  description: "中国CPI数据"

  input: []

  output:
    - {name: "date", type: "date"}
    - {name: "cpi", type: "float", desc: "CPI指数"}

  rate_limit_key: "em_datacenter"

  sources:
    - name: "akshare_em"
      func: "macro_china_cpi"
      enabled: true
      output_mapping:
        月份: "date"
        全国居民消费价格指数(CPI)上年同月=100: "cpi"
      column_types:
        date: "date"

  cache_table: macro_data
macro_gdp:
  name: "macro_gdp"
