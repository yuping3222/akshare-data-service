# 股票行情接口
# category: equity

equity_daily:
  name: "equity_daily"
  category: "equity"
  description: "A股日线数据（含复权）"

  input:
    - {name: "symbol", type: "str", required: true, desc: "股票代码，如 000001"}
    - {name: "start_date", type: "date", required: true, desc: "开始日期 YYYY-MM-DD"}
    - {name: "end_date", type: "date", required: true, desc: "结束日期 YYYY-MM-DD"}
    - {name: "adjust", type: "str", required: false, default: "qfq", desc: "复权: qfq/hfq/none"}

  output:
    - {name: "date", type: "date", desc: "交易日期"}
    - {name: "open", type: "float", desc: "开盘价"}
    - {name: "high", type: "float", desc: "最高价"}
    - {name: "low", type: "float", desc: "最低价"}
    - {name: "close", type: "float", desc: "收盘价"}
    - {name: "volume", type: "float", desc: "成交量"}
    - {name: "amount", type: "float", desc: "成交额"}

  rate_limit_key: "sina_vip"

  sources:
    - name: "akshare_sina"
      func: "stock_zh_a_daily"
      enabled: true
      input_mapping:
        symbol: "symbol"
        start_date: "start_date"
        end_date: "end_date"
        adjust: "adjust"
      param_transforms:
        symbol: "prepend_prefix:sh/sz"
        start_date: "YYYYMMDD"
        end_date: "YYYYMMDD"
      output_mapping:
        day: "date"
        open: "open"
        high: "high"
        low: "low"
        close: "close"
        volume: "volume"
      column_types:
        date: "date"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"

    - name: "akshare_em"
      func: "stock_zh_a_hist"
      enabled: true
      input_mapping:
        symbol: "symbol"
        start_date: "start_date"
        end_date: "end_date"
        adjust: "adjust"
      param_transforms:
        start_date: "YYYYMMDD"
        end_date: "YYYYMMDD"
      output_mapping:
        日期: "date"
        开盘: "open"
        最高: "high"
        最低: "low"
        收盘: "close"
        成交量: "volume"
        成交额: "amount"
      column_types:
        date: "date"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"
        amount: "float"

    - name: "tushare"
      func: "daily"
      enabled: false
      type: "adapter"
      requires_token: true
      input_mapping:
        symbol: "ts_code"
        start_date: "start_date"
        end_date: "end_date"
      param_transforms:
        symbol: "to_ts_code"
        start_date: "YYYYMMDD"
        end_date: "YYYYMMDD"
      output_mapping:
        trade_date: "date"
        open: "open"
        high: "high"
        low: "low"
        close: "close"
        vol: "volume"
        amount: "amount"
      column_types:
        date: "date"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"
        amount: "float"

equity_minute:
  name: "equity_minute"
  category: "equity"
  description: "A股分钟线数据"

  input:
    - {name: "symbol", type: "str", required: true}
    - {name: "start_date", type: "datetime", required: false}
    - {name: "end_date", type: "datetime", required: false}
    - {name: "period", type: "str", required: false, default: "5", desc: "分钟周期: 1/5/15/30/60"}
    - {name: "adjust", type: "str", required: false, default: ""}

  output:
    - {name: "datetime", type: "datetime", desc: "时间戳"}
    - {name: "open", type: "float"}
    - {name: "high", type: "float"}
    - {name: "low", type: "float"}
    - {name: "close", type: "float"}
    - {name: "volume", type: "float"}
    - {name: "amount", type: "float"}

  rate_limit_key: "default"

  sources:
    - name: "akshare_sina"
      func: "stock_zh_a_minute"
      enabled: true
      input_mapping:
        symbol: "symbol"
        period: "period"
        adjust: "adjust"
      output_mapping:
        day: "datetime"
        open: "open"
        high: "high"
        low: "low"
        close: "close"
        volume: "volume"
        amount: "amount"
      column_types:
        datetime: "datetime"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"
        amount: "float"

    - name: "akshare_em"
      func: "stock_zh_a_hist_min_em"
      enabled: false
      input_mapping:
        symbol: "symbol"
        start_date: "start_date"
        end_date: "end_date"
        period: "period"
        adjust: "adjust"
      param_transforms:
        start_date: "YYYYMMDD"
        end_date: "YYYYMMDD"
      output_mapping:
        时间: "datetime"
        开盘: "open"
        最高: "high"
        最低: "low"
        收盘: "close"
        成交量: "volume"
        成交额: "amount"
      column_types:
        datetime: "datetime"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"
        amount: "float"

