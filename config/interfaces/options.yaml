# 期权接口
# category: options

option_daily:
  name: "option_daily"
  category: "options"
  description: "期权日线历史数据"

  input:
    - {name: "symbol", type: "str", required: true, desc: "期权代码"}

  output:
    - {name: "date", type: "date", desc: "日期"}
    - {name: "open", type: "float", desc: "开盘价"}
    - {name: "high", type: "float", desc: "最高价"}
    - {name: "low", type: "float", desc: "最低价"}
    - {name: "close", type: "float", desc: "收盘价"}
    - {name: "volume", type: "float", desc: "成交量"}

  rate_limit_key: "default"

  sources:
    - name: "akshare_sina"
      func: "option_sse_daily_sina"
      enabled: true
      input_mapping:
        symbol: "symbol"
      output_mapping:
        日期: "date"
        开盘: "open"
        最高: "high"
        最低: "low"
        收盘: "close"
        成交量: "volume"
      column_types:
        date: "date"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"

options_realtime:
  name: "options_realtime"
  category: "options"
  description: "期权实时行情（东方财富全市场）"

  input: []

  output:
    - {name: "symbol", type: "str", desc: "期权代码"}
    - {name: "underlying", type: "str", desc: "标的代码"}
    - {name: "option_type", type: "str", desc: "期权类型: C/P"}
    - {name: "strike", type: "float", desc: "行权价"}
    - {name: "expiration", type: "date", desc: "到期日"}
    - {name: "price", type: "float", desc: "最新价"}
    - {name: "volume", type: "float", desc: "成交量"}
    - {name: "open_interest", type: "float", desc: "持仓量"}

  rate_limit_key: "em_push2"

  sources:
    - name: "akshare_em"
      func: "option_current_em"
      enabled: true
      output_mapping:
        期权代码: "symbol"
        标的代码: "underlying"
        期权类型: "option_type"
        行权价: "strike"
        到期日: "expiration"
        最新价: "price"
        成交量: "volume"
        持仓量: "open_interest"
      column_types:
        strike: "float"
        expiration: "date"
        price: "float"
        volume: "float"
        open_interest: "float"

option_current_day_sse:
  name: "option_current_day_sse"
  category: "options"
  description: "上交所期权当日合约（无参数）"

  input: []

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_sse"
      func: "option_current_day_sse"
      enabled: true
      output_mapping:
        合约编码: symbol
        合约交易代码: trade_code
        合约简称: name
        标的券名称及代码: underlying
        类型: option_type
        行权价: strike
        合约单位: contract_unit
        期权行权日: exercise_date
        到期日: expiration_date
        开始日期: start_date

options_chain:
  name: "options_chain"
  category: "options"
  description: "期权链数据"

  input:
    - {name: "symbol", type: "str", required: true}
    - {name: "end_month", type: "str", required: false}

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "option_finance_board"
      enabled: true
      input_mapping:
        symbol: "symbol"
        end_month: "end_month"
      output_mapping:
        合约交易代码: symbol
        当前价: close
        涨跌幅: change_pct
        前收盘价: prev_close
        开盘价: open
        最高价: high
        最低价: low
        成交量: volume
        持仓量: open_interest
        行权价: strike

options_expirations:
  name: "options_expirations"
  category: "options"
  description: "期权到期日列表"

  input:
    - {name: "symbol", type: "str", required: true}
    - {name: "end_month", type: "str", required: false}

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "option_finance_board"
      enabled: true
      input_mapping:
        symbol: "symbol"
        end_month: "end_month"
      output_mapping:
        合约交易代码: symbol
        行权价: strike
        到期日: expiration_date

options_hist:
  name: "options_hist"
  category: "options"
  description: "期权历史行情"

  input:
    - {name: "symbol", type: "str", required: true}

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "option_comm_info"
      enabled: true
      input_mapping:
        symbol: "symbol"
      output_mapping:
        期权品种: variety
        现价: close
        涨/跌停板: limit
        成交量: volume
        类型: option_type
        权利金: premium
        开仓: open_position_fee
        平昨: close_yesterday_fee
        平今: close_today_fee
        行权: exercise_fee
        备注: remark
        交易所: exchange
        手续费更新时间: fee_update_time
        价格更新时间: price_update_time

option_sse_greeks_sina:
  name: "option_sse_greeks_sina"
  category: "options"
  description: "期权希腊值数据（新浪源）"

  input:
    - {name: "symbol", type: "str", required: true, desc: "期权代码"}

  output:
    - {name: "symbol", type: "str", desc: "期权代码"}
    - {name: "delta", type: "float", desc: "Delta"}
    - {name: "gamma", type: "float", desc: "Gamma"}
    - {name: "theta", type: "float", desc: "Theta"}
    - {name: "vega", type: "float", desc: "Vega"}
    - {name: "rho", type: "float", desc: "Rho"}

  rate_limit_key: "default"

  sources:
    - name: "akshare_sina"
      func: "option_sse_greeks_sina"
      enabled: true
      input_mapping:
        symbol: "symbol"
      output_mapping:
        字段: item
        值: value
