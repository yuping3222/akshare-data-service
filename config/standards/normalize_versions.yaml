# Normalize Version Registry
#
# Tracks the current and historical normalize_version for each
# (dataset, source) pair. Updated whenever field mapping rules change.
#
# Consumers:
#   - MappingLoader: resolves current normalize_version for a dataset+source
#   - Normalizers: inject normalize_version into system fields
#   - Lineage: traces which version produced a given record
#   - Tests: validates mapping completeness per version
#
# Versioning rules:
#   - Versions are monotonically increasing: v1, v2, v3, ...
#   - Each entry records changed_from (previous version) and change_reason
#   - current: true marks the active version for new normalizations
#   - Historical versions remain for replay/backfill of old batches

version: '1.0'

