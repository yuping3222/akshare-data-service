# 可转债接口
# category: bond

convert_bond_premium:
  name: "convert_bond_premium"
  category: "bond"
  description: "可转债溢价率数据"

  input: []
  output:
    - {name: "symbol", type: "str", desc: "转债代码"}
    - {name: "name", type: "str", desc: "转债名称"}
    - {name: "price", type: "float", desc: "转债价格"}
    - {name: "premium_rate", type: "float", desc: "溢价率%"}

  rate_limit_key: "em_datacenter"

  sources:
    # NOTE: bond_cb_summary_em does NOT exist in akshare.
    # Replaced with bond_zh_cov (东方财富可转债数据) which returns all
    # convertible bond data including premium rates.
    - name: "akshare_em"
      func: "bond_zh_cov"
      enabled: true
      output_mapping:
        转债代码: "symbol"
        转债名称: "name"
        最新价: "price"
        转股溢价率: "premium_rate"
      column_types:
        price: "float"
        premium_rate: "float"

convert_bond_spot:
  name: "convert_bond_spot"
  category: "bond"
  description: "可转债实时行情"

  input: []

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "bond_zh_hs_cov_spot"
      enabled: true
      output_mapping:
        code: symbol
        name: name
        trade: close
        pricechange: change
        changepercent: change_pct
        open: open
        high: high
        low: low
        volume: volume
        amount: amount

conversion_bond_daily:
  name: "conversion_bond_daily"
  category: "bond"
  description: "可转债日线行情"

  input:
    - {name: "symbol", type: "str", required: true, desc: "可转债代码，如 sz123124"}

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "bond_zh_hs_cov_daily"
      enabled: true
      input_mapping:
        symbol: "symbol"
      output_mapping:
        date: date
        open: open
        high: high
        low: low
        close: close
        volume: volume

