# 指数接口
# category: index

index_daily:
  name: "index_daily"
  category: "index"
  description: "指数日线数据"

  input:
    - {name: "symbol", type: "str", required: true, desc: "指数代码"}
    - {name: "period", type: "str", required: false, default: "daily", desc: "周期: daily/weekly/monthly"}
    - {name: "start_date", type: "date", required: true}
    - {name: "end_date", type: "date", required: true}

  output:
    - {name: "date", type: "date"}
    - {name: "open", type: "float"}
    - {name: "high", type: "float"}
    - {name: "low", type: "float"}
    - {name: "close", type: "float"}
    - {name: "volume", type: "float"}
    - {name: "amount", type: "float"}

  rate_limit_key: "sina_vip"

  sources:
    - name: "akshare_em"
      func: "index_zh_a_hist"
      enabled: true
      input_mapping:
        symbol: "symbol"
        period: "period"
        start_date: "start_date"
        end_date: "end_date"
      param_transforms:
        start_date: "YYYYMMDD"
        end_date: "YYYYMMDD"
      output_mapping:
        日期: "date"
        开盘: "open"
        最高: "high"
        最低: "low"
        收盘: "close"
        成交量: "volume"
        成交额: "amount"
      column_types:
        date: "date"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"
        amount: "float"

index_components:
  name: "index_components"
  category: "index"
  description: "指数成份股"

  input:
    - {name: "symbol", type: "str", required: true, desc: "指数代码"}

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_csindex"
      func: "index_stock_cons_csindex"
      enabled: true
      input_mapping:
        symbol: "symbol"
      output_mapping: {}

index_list:
  name: "index_list"
  category: "index"
  description: "指数列表"

  input:
    - {name: "symbol", type: "str", required: false, default: "上证系列指数"}

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "stock_zh_index_spot_em"
      enabled: true
      input_mapping:
        symbol: "symbol"
      output_mapping: {}

index_valuation:
  name: "index_valuation"
  category: "index"
  description: "指数估值数据"

  input:
    - {name: "index_code", type: "str", required: true, desc: "指数代码，如 H30374"}

  output: []

  rate_limit_key: "default"

  sources:
    - name: "akshare_csindex"
      func: "stock_zh_index_value_csindex"
      enabled: true
      input_mapping:
        index_code: "symbol"
      output_mapping: {}
