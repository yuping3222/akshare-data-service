  volatility_yz_rv:
    category: other
    description: "波动率-已实现波动率-Yang-Zhang 已实现波动率(Yang-Zhang Realized Volatility)\nhttps://github.com/hugogobato/Yang-Zhang-s-Realized-Volatility-Automated-Estimation-in-Python\n\
      论文地址：https://www.jstor.org/stable/10.1086/209650\n基于以下公式计算:\nRV^2 = Vo + k*Vc\
      \ + (1-k)*Vrs\n其中:\n- Vo: 隔夜波动率, Vo = 1/(n-1)*sum(Oi-Obar)^2\n    Oi为标准化开盘价,\
      \ Obar为标准化开盘价均值\n- Vc: 收盘波动率, Vc = 1/(n-1)*sum(ci-Cbar)^2\n    ci为标准化收盘价, Cbar为标准化收盘价均值\n\
      - k: 权重系数, k = 0.34/(1.34+(n+1)/(n-1))\n    n为样本数量\n- Vrs: Rogers-Satchell波动率代理,\
      \ Vrs = ui(ui-ci)+di(di-ci)\n    ui = ln(Hi/Oi), ci = ln(Ci/Oi), di = ln(Li/Oi),\
      \ oi = ln(Oi/Ci-1)\n    Hi/Li/Ci/Oi分别为最高价/最低价/收盘价/开盘价\n\n:param data: 包含 OHLC(开高低收)\
      \ 价格的 pandas.DataFrame\n:type data: pandas.DataFrame\n:return: 包含 Yang-Zhang\
      \ 实现波动率的 pandas.DataFrame\n:rtype: pandas.DataFrame\n\n要求输入数据包含以下列:\n- Open:\
      \ 开盘价\n- High: 最高价\n- Low: 最低价\n- Close: 收盘价\n# yang_zhang_rv formula is give\
      \ as:\n# RV^2 = Vo + k*Vc + (1-k)*Vrs\n# where Vo = 1/(n-1)*sum(Oi-Obar)^2\n\
      # with oi = normalized opening price at time t and Obar = mean of normalized\
      \ opening prices\n# Vc = = 1/(n-1)*sum(ci-Cbar)^2\n# with ci = normalized close\
      \ price at time t and Cbar = mean of normalized close prices\n# k = 0.34/(1.34+(n+1)/(n-1))\n\
      # with n = total number of days or time periods considered\n# Vrs (Rogers &\
      \ Satchell RV proxy) = ui(ui-ci)+di(di-ci)\n# with ui = ln(Hi/Oi), ci = ln(Ci/Oi),\
      \ di=(Li/Oi), oi = ln(Oi/Ci-1)\n# where Hi = high price at time t and Li = low\
      \ price at time t"
    domains:
    - github.com
    - www.jstor.org
    name: volatility_yz_rv
    probe:
      check_interval: 2592000
      params:
        '2': Vo
        Cbar: mean
        Hi: high
        Li: low
        Obar: mean
        Vc: '='
        Vo: 1/(n-1)*sum(Oi-Obar)^2
        Vrs: ui(ui-ci)+di(di-ci)
        ci: ln(Ci/Oi)
        di: (Li/Oi)
        k: 0.34/(1.34+(n+1)/(n-1))
        n: total
        oi: ln(Oi/Ci-1)
        ui: ln(Hi/Oi)
      skip: false
    rate_limit_key: default
    signature:
    - data
    sources: []
  xincaifu_rank:
