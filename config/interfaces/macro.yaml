macro_exchange_rate:
  name: "macro_exchange_rate"
  category: "macro"
  description: "汇率数据"

  input: []

  output:
    - {name: "date", type: "date", desc: "日期"}
    - {name: "currency_pair", type: "str", desc: "货币对"}
    - {name: "rate", type: "float", desc: "汇率"}

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "forex_spot_em"
      enabled: true
      output_mapping:
        日期: "date"
        货币对: "currency_pair"
        最新价: "rate"
      column_types:
        date: "date"
        currency_pair: "str"
        rate: "float"
