# Entity: bond_daily
#
# 债券日线行情标准实体配置
# 优先级: P1
#
# 加载方：
#   - governance catalog：实体注册
#   - quality DSL：规则字段引用
#   - service docgen：输出字段文档
#   - normalizer：schema 校验与 merge

version: '1.0'

entity: bond_daily
description: 利率债 / 信用债日线行情（含到期收益率）
priority: P1
storage_layer: daily

# ---------------------------------------------------------------------------
# 主键与分区
# ---------------------------------------------------------------------------
primary_key:
  - symbol
  - trade_date

partition_by:
  - trade_date

# ---------------------------------------------------------------------------
# 时间字段
# ---------------------------------------------------------------------------
time_fields:
  trade_date:
    description: 交易日期
    role: business
  ingest_time:
    description: 入库时间
    role: system

# ---------------------------------------------------------------------------
# 必填字段
# ---------------------------------------------------------------------------
required_fields:
  - symbol
  - trade_date
  - close
  - yield_to_maturity

# ---------------------------------------------------------------------------
# 字段定义
# ---------------------------------------------------------------------------
fields:
  symbol:
    type: string
    description: 债券代码（如 019716.SH）
    required: true

  trade_date:
    type: date
    description: 交易日期
    required: true

  open:
    type: double
    description: 开盘全价
    unit: CNY
    required: false

  high:
    type: double
    description: 最高全价
    unit: CNY
    required: false

  low:
    type: double
    description: 最低全价
    unit: CNY
    required: false

  close:
    type: double
    description: 收盘全价
    unit: CNY
    required: true

  volume:
    type: double
    description: 成交量（手）
    unit: lot
    required: false

  amount:
    type: double
    description: 成交额
    unit: CNY
    required: false

  yield_to_maturity:
    type: double
    description: 到期收益率（YTM）
    unit: pct
    required: true

  duration:
    type: double
    description: 修正久期
    unit: year
    required: false

  maturity_date:
    type: date
    description: 到期日
    required: false

# ---------------------------------------------------------------------------
# 系统字段（所有 Standardized / Served 数据集统一）
# ---------------------------------------------------------------------------
system_fields:
  batch_id:
    type: string
    required: true
  source_name:
    type: string
    required: true
  interface_name:
    type: string
    required: true
  ingest_time:
    type: timestamp
    required: true
  normalize_version:
    type: string
    required: true
  schema_version:
    type: string
    required: true
  quality_status:
    type: string
    required: true
  publish_time:
    type: timestamp
    required: false
  release_version:
    type: string
    required: false
