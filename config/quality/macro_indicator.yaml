# Quality rules for macro_indicator
#
# Dataset: macro_indicator (P0)
# Entity: macro_indicator
# Schema: v1
#
# Rules reference standard fields from docs/design/30-standard-entities.md
# and config/standards/entities/macro_indicator.yaml

version: '1.0'
dataset: macro_indicator
entity: macro_indicator
schema_version: v1

rules:
  # ---- Primary key & non-null ----
  - rule_id: macro_pk_unique
    layer: standardized
    type: unique_key
    severity: error
    gate_action: block
    fields: [indicator_code, observation_date]
    description: 主键必须唯一

  - rule_id: macro_required_non_null
    layer: standardized
    type: non_null
    severity: error
    gate_action: block
    fields: [indicator_code, indicator_name, frequency, observation_date, value]
    description: 必填字段非空

  # ---- Frequency enum ----
  - rule_id: macro_frequency_enum
    layer: standardized
    type: enum
    severity: error
    gate_action: block
    field: frequency
    values: [D, W, M, Q, Y]
    description: 频率为标准枚举值

  # ---- Value range ----
  - rule_id: macro_value_not_negative_for_positive_indicators
    layer: standardized
    type: range
    severity: warning
    gate_action: alert
    field: value
    min: 0
    description: 观测值非负（适用于GDP等正向指标）

  # ---- Continuity for monthly/quarterly indicators ----
  - rule_id: macro_continuity
    layer: standardized
    type: continuity
    severity: warning
    gate_action: alert
    field: observation_date
    max_gap_days: 40
    description: 宏观指标日期连续性（月度指标允许最多40天空档）

  # ---- Freshness ----
  - rule_id: macro_freshness
    layer: standardized
    type: freshness
    severity: warning
    gate_action: alert
    field: observation_date
    max_age_days: 60
    description: 宏观指标新鲜度（最近观测值不超过60天）

  # ---- Numeric anomaly ----
  - rule_id: macro_value_anomaly
    layer: standardized
    type: numeric_anomaly
    severity: info
    gate_action: ignore
    field: value
    method: zscore
    zscore_threshold: 4.0
    description: 观测值Z-score异常检测（阈值4.0）

  # ---- PK coverage ----
  - rule_id: macro_pk_coverage
    layer: standardized
    type: pk_coverage
    severity: error
    gate_action: block
    fields: [indicator_code, observation_date]
    min_coverage: 1.0
    description: 主键字段覆盖率100%

  # ---- Cross-source diff ----
  - rule_id: macro_cross_source_value
    layer: standardized
    type: cross_source_diff
    severity: warning
    gate_action: alert
    field: value
    source_col: source_name
    key_fields: [indicator_code, observation_date]
    tolerance: 0.02
    tolerance_type: relative
    description: 跨源观测值偏差检测（容忍2%相对偏差）

  # ---- 新增业务质量规则 ----
  - rule_id: macro_value_yoy_pct_range
    layer: standardized
    type: range
    severity: warning
    gate_action: alert
    field: value_yoy_pct
    min: -20
    max: 20
    description: 同比增速应在合理范围内 [-20%, 20%]（超出可能为数据错误，如 CPI/GDP 年化变化）

  - rule_id: macro_value_mom_pct_range
    layer: standardized
    type: range
    severity: warning
    gate_action: alert
    field: value_mom_pct
    min: -10
    max: 10
    description: 环比增速应在合理范围内 [-10%, 10%]（超出可能为季节性异常或数据错误）

  - rule_id: macro_unit_non_null
    layer: standardized
    type: non_null
    severity: warning
    gate_action: alert
    fields: [unit]
    description: 指标单位字段不应为空，缺失单位影响数据可解释性及下游计算

  - rule_id: macro_value_iqr_anomaly
    layer: standardized
    type: numeric_anomaly
    severity: warning
    gate_action: alert
    field: value
    description: 观测值 IQR 异常检测（IQR 倍数 4.0，与 z-score 方法互补）
    params:
      method: iqr
      iqr_multiplier: 4.0
