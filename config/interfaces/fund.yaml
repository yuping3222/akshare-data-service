etf_daily:
  name: "etf_daily"
  category: "fund"
  description: "ETF日线数据"

  input:
    - {name: "symbol", type: "str", required: true}
    - {name: "start_date", type: "date", required: true}
    - {name: "end_date", type: "date", required: true}
    - {name: "adjust", type: "str", required: false, default: "qfq"}

  output:
    - {name: "date", type: "date"}
    - {name: "open", type: "float"}
    - {name: "high", type: "float"}
    - {name: "low", type: "float"}
    - {name: "close", type: "float"}
    - {name: "volume", type: "float"}
    - {name: "amount", type: "float"}

  rate_limit_key: "em_push2his"

  sources:
    - name: "akshare_em"
      func: "fund_etf_hist_em"
      enabled: true
      input_mapping:
        symbol: "symbol"
        start_date: "start_date"
        end_date: "end_date"
        adjust: "adjust"
      param_transforms:
        start_date: "YYYYMMDD"
        end_date: "YYYYMMDD"
      output_mapping:
        日期: "date"
        开盘: "open"
        最高: "high"
        最低: "low"
        收盘: "close"
        成交量: "volume"
        成交额: "amount"
      column_types:
        date: "date"
        open: "float"
        high: "float"
        low: "float"
        close: "float"
        volume: "float"
        amount: "float"

fund_manager_info:
  name: "fund_manager_info"
  category: "fund"
  description: "基金经理信息"

  input: []

  output:
    - {name: "seq", type: "int", desc: "序号"}
    - {name: "name", type: "str", desc: "姓名"}
    - {name: "company", type: "str", desc: "所属公司"}
    - {name: "fund_code", type: "str", desc: "现任基金代码"}
    - {name: "fund_name", type: "str", desc: "现任基金"}
    - {name: "tenure_days", type: "int", desc: "累计从业时间"}
    - {name: "asset_scale", type: "float", desc: "现任基金资产总规模"}
    - {name: "best_return", type: "float", desc: "现任基金最佳回报"}

  rate_limit_key: "default"

  sources:
    - name: "akshare_em"
      func: "fund_manager_em"
      enabled: true
      input_mapping: {}
      output_mapping:
        序号: "seq"
        姓名: "name"
        所属公司: "company"
        现任基金代码: "fund_code"
        现任基金: "fund_name"
        累计从业时间: "tenure_days"
        现任基金资产总规模: "asset_scale"
        现任基金最佳回报: "best_return"
      column_types:
        seq: "int"
        name: "str"
        company: "str"
        fund_code: "str"
        fund_name: "str"
        tenure_days: "int"
        asset_scale: "float"
        best_return: "float"

