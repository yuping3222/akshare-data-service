# Entity: money_flow
#
# 个股资金流向日线标准实体配置
# 优先级: P1
#
# 加载方：
#   - governance catalog：实体注册
#   - quality DSL：规则字段引用
#   - service docgen：输出字段文档
#   - normalizer：schema 校验与 merge
#   - core/schema.py YAML bridge：运行时字段修订

version: '1.0'

entity: money_flow
description: 个股日线资金流向（主力 / 超大单 / 大单 / 中单 / 散单）
priority: P1
storage_layer: daily

# ---------------------------------------------------------------------------
# 主键与分区
# ---------------------------------------------------------------------------
primary_key:
  - symbol
  - date

partition_by:
  - date

# ---------------------------------------------------------------------------
# 时间字段
# ---------------------------------------------------------------------------
time_fields:
  date:
    description: 交易日期
    role: business
  ingest_time:
    description: 入库时间
    role: system

# ---------------------------------------------------------------------------
# 必填字段
# ---------------------------------------------------------------------------
required_fields:
  - symbol
  - date
  - main_net_inflow

# ---------------------------------------------------------------------------
# 字段定义
# ---------------------------------------------------------------------------
fields:
  symbol:
    type: string
    description: 证券代码
    required: true

  date:
    type: date
    description: 交易日期
    required: true

  main_net_inflow:
    type: double
    description: 主力净流入额（超大单 + 大单合计）
    unit: CNY
    required: true

  super_large_net_inflow:
    type: double
    description: 超大单净流入额（单笔 ≥ 100 万）
    unit: CNY
    required: false

  large_net_inflow:
    type: double
    description: 大单净流入额（单笔 20–100 万）
    unit: CNY
    required: false

  medium_net_inflow:
    type: double
    description: 中单净流入额（单笔 4–20 万）
    unit: CNY
    required: false

  small_net_inflow:
    type: double
    description: 散单净流入额（单笔 < 4 万）
    unit: CNY
    required: false

# ---------------------------------------------------------------------------
# 系统字段（所有 Standardized / Served 数据集统一）
# ---------------------------------------------------------------------------
system_fields:
  batch_id:
    type: string
    required: true
  source_name:
    type: string
    required: true
  interface_name:
    type: string
    required: true
  ingest_time:
    type: timestamp
    required: true
  normalize_version:
    type: string
    required: true
  schema_version:
    type: string
    required: true
  quality_status:
    type: string
    required: true
  publish_time:
    type: timestamp
    required: false
  release_version:
    type: string
    required: false
