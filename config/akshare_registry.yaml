  air_quality_hist:
    category: other
    description: '真气网-空气历史数据

      https://www.zq12369.com/

      :param city: 调用 ak.air_city_table() 接口获取所有城市列表

      :type city: str

      :param period: "hour": 每小时一个数据, 由于数据量比较大, 下载较慢; "day": 每天一个数据; "month": 每个月一个数据

      :type period: str

      :param start_date: e.g., "20190327"

      :type start_date: str

      :param end_date: e.g., "20200327"

      :type end_date: str

      :return: 指定城市和数据频率下在指定时间段内的空气质量数据

      :rtype: pandas.DataFrame'
    domains:
    - www.zq12369.com
    name: air_quality_hist
    probe:
      check_interval: 2592000
      params:
        end_date: '20260420'
        period: daily
        start_date: '20260417'
      skip: false
    rate_limit_key: default
    signature:
    - city
    - period
    - start_date
    - end_date
    sources: []
  air_quality_rank:
    category: other
    description: '真气网-168 城市 AQI 排行榜

      https://www.zq12369.com/environment.php?date=2020-03-12&tab=rank&order=DESC&type=DAY#rank

