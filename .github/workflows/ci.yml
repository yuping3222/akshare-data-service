name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

      - name: Run ruff format (check only)
        run: ruff format --check src/ tests/

  check-no-legacy-source-access:
    name: Check No Direct Legacy Source Access
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Forbid self.akshare/lixinger/tushare in service layer
        run: |
          # Search for direct self.akshare/lixinger/tushare access (not self._legacy.akshare)
          # The pattern matches self. immediately followed by akshare/lixinger/tushare
          if grep -rn 'self\.\(akshare\|lixinger\|tushare\)\b' \
              src/akshare_data/service/ \
              src/akshare_data/service_facade.py \
              src/akshare_data/namespace_assembly.py 2>/dev/null; then
            echo "ERROR: Found forbidden direct legacy source access in service layer!"
            echo "Use self._legacy.akshare / self._legacy.lixinger instead."
            exit 1
          fi
          echo "OK: No direct legacy source access found in service layer."

  validate-config:
    name: Validate Config Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML config files
        run: python -c "import yaml, glob, sys; errors = []; [yaml.safe_load(open(f)) for f in glob.glob('config/**/*.yaml', recursive=True)]; print('All config files valid')"

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -m "not network and not slow"

  test-coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short -m "not network and not slow" --cov=akshare_data --cov-report=term-missing --cov-fail-under=75

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, validate-config]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short -m integration --cov=akshare_data --cov-report=term-missing

  test-system:
    name: System Tests
    runs-on: ubuntu-latest
    needs: [lint, validate-config]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Run system tests
        run: python -m pytest tests/system/ -v --tb=short -m system --cov=akshare_data --cov-report=term-missing

  docker:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [lint, validate-config]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t akshare-data-service:latest .

      - name: Verify container starts
        run: docker run --rm akshare-data-service:latest python -c "from akshare_data import DataService, get_daily; print('Import OK')"

      - name: Run tests inside container
        run: |
          docker run --rm akshare-data-service:latest pip install pytest pytest-cov
          docker run --rm -v ${{ github.workspace }}/tests:/app/tests akshare-data-service:latest python -m pytest tests/integration/ tests/system/ -v --tb=short -m "not network"
