shibor_rate:
  name: "shibor_rate"
  category: "macro"
  description: "上海银行间同业拆放利率(Shibor)"

  input: []

  output:
    - {name: "date", type: "date", desc: "日期"}
    - {name: "on", type: "float", desc: "隔夜"}
    - {name: "1w", type: "float", desc: "1周"}
    - {name: "2w", type: "float", desc: "2周"}
    - {name: "1m", type: "float", desc: "1个月"}
    - {name: "3m", type: "float", desc: "3个月"}
    - {name: "6m", type: "float", desc: "6个月"}
    - {name: "9m", type: "float", desc: "9个月"}
    - {name: "1y", type: "float", desc: "1年"}

  rate_limit_key: "em_datacenter"

  sources:
    - name: "akshare_em"
      func: "macro_china_shibor_all"
      enabled: true
      output_mapping:
        日期: "date"
        隔夜: "on"
        1周: "1w"
        2周: "2w"
        1月: "1m"
        3月: "3m"
        6月: "6m"
        9月: "9m"
        1年: "1y"
      column_types:
        date: "date"
        on: "float"
        1w: "float"
        2w: "float"
        1m: "float"
        3m: "float"
        6m: "float"
        9m: "float"
        1y: "float"

  aliases:
    - macro_shibor
