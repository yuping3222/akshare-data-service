# System Configuration
# Centralized system settings for cache, logging, and sources.
# Note: This file is not yet loaded by production code.
# See docs/design/11-config-redesign.md for planned integration.

version: '1.0'

# ------------------------------------------------------------
# Cache Configuration (matches CacheConfig defaults in config.py)
# ------------------------------------------------------------
cache:
  base_dir: "./cache"

  memory:
    max_items: 5000
    default_ttl_seconds: 3600

  duckdb:
    threads: 4
    memory_limit: "4GB"

  parquet:
    compression: snappy
    row_group_size: 100000

  retention_hours: 24
  strict_schema: false

# ------------------------------------------------------------
# Logging Configuration
# Matches config/logging/access.yaml values.
# See docs/design/11-config-redesign.md for planned consolidation.
# ------------------------------------------------------------
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  access_log:
    log_dir: "logs"
    max_buffer: 100
    flush_interval: 5.0
    backup_days: 30

# ------------------------------------------------------------
# Data Source Configuration
# Values mirror config/sources/failover.yaml — kept as reference.
# Production code reads failover.yaml directly.
# ------------------------------------------------------------
sources:
  default_sources:
    - lixinger
    - akshare_em
    - akshare_sina
    - tushare
    - akshare_sse

  max_retries: 3
  retry_delay: 2.0
  timeout: 30

  failover:
    failure_threshold: 3
    cooldown_seconds: 300
    auto_recovery:
      enabled: true
      interval: 3600
    priority:
      lixinger: 1
      akshare_em: 2
      akshare_sina: 3
      tushare: 4
      akshare_sse: 5

# ------------------------------------------------------------
# Download Scheduler Configuration
# ------------------------------------------------------------
download:
  max_workers: 4
  rate_limit_enabled: true
  batch_size: 50
