version: '1.0'
dataset: market_quote_daily
entity: market_quote_daily
schema_version: v1
rules:
  # Raw layer: technical rules only
  - rule_id: mq_raw_sys_fields
    layer: raw
    type: system_fields_complete
    severity: error
    gate_action: block
    description: Raw 系统字段必须完整
    params:
      system_fields:
        - batch_id
        - source_name
        - interface_name
        - ingest_time

  - rule_id: mq_raw_record_count
    layer: raw
    type: record_count_min
    severity: error
    gate_action: block
    description: Raw 最低记录数
    params:
      min_count: 1

  - rule_id: mq_raw_request_before_ingest
    layer: raw
    type: request_before_ingest
    severity: warning
    gate_action: alert
    description: Raw 请求时间不晚于入库时间
    params:
      request_time_field: request_time
      ingest_time_field: ingest_time

  # Standardized layer: business rules
  - rule_id: mq_daily_pk_unique
    layer: standardized
    type: unique_key
    severity: error
    gate_action: block
    fields: [security_id, trade_date, adjust_type]
    description: 主键必须唯一

  - rule_id: mq_daily_non_null
    layer: standardized
    type: non_null
    severity: error
    gate_action: block
    fields: [security_id, trade_date, adjust_type, open_price, high_price, low_price, close_price, volume, turnover_amount]
    description: 核心字段不能为空

  - rule_id: mq_daily_close_positive
    layer: standardized
    type: range
    severity: error
    gate_action: block
    field: close_price
    min: 0
    description: 收盘价必须 >= 0

  - rule_id: mq_daily_high_ge_low
    layer: standardized
    type: business_rule
    severity: error
    gate_action: block
    expression: high_price >= low_price
    description: 最高价 >= 最低价

  - rule_id: mq_daily_turnover_non_negative
    layer: standardized
    type: range
    severity: error
    gate_action: block
    field: turnover_amount
    min: 0
    description: 成交额必须 >= 0

  - rule_id: mq_daily_volume_non_negative
    layer: standardized
    type: range
    severity: error
    gate_action: block
    field: volume
    min: 0
    description: 成交量必须 >= 0

  - rule_id: mq_daily_freshness
    layer: standardized
    type: freshness
    severity: warning
    gate_action: alert
    field: trade_date
    description: 数据新鲜度检查
    params:
      max_age_days: 3

  # ---- 金融量级异常规则 ----
  - rule_id: mqd_open_price_non_negative
    layer: standardized
    type: range
    severity: error
    gate_action: block
    field: open_price
    min: 0
    description: 开盘价必须 >= 0（负价格为严重数据错误）

  - rule_id: mqd_high_price_non_negative
    layer: standardized
    type: range
    severity: error
    gate_action: block
    field: high_price
    min: 0
    description: 最高价必须 >= 0（负价格为严重数据错误）

  - rule_id: mqd_close_price_spike
    layer: standardized
    type: numeric_anomaly
    severity: warning
    gate_action: alert
    field: close_price
    description: 收盘价 z-score 超过 5 标准差视为异常（跳空或数据错误）
    params:
      method: zscore
      zscore_threshold: 5.0

  - rule_id: mqd_trade_date_continuity
    layer: standardized
    type: continuity
    severity: warning
    gate_action: alert
    field: trade_date
    description: 交易日期连续性检测（最大允许 5 天空档，覆盖节假日）
    params:
      max_gap_days: 5

  - rule_id: mqd_price_anomaly_ohlc
    layer: standardized
    type: price_anomaly
    severity: warning
    gate_action: alert
    description: OHLC 综合异常检测（高低倒挂、负价格、极端涨跌幅 >20%）
    params:
      high_field: high_price
      low_field: low_price
      open_field: open_price
      close_field: close_price
      max_change_pct: 20.0
      date_field: trade_date

  - rule_id: mqd_volume_spike
    layer: standardized
    type: numeric_anomaly
    severity: warning
    gate_action: alert
    field: volume
    description: 成交量 z-score 超过 5 标准差视为异常（停牌或数据录入错误）
    params:
      method: zscore
      zscore_threshold: 5.0
